name: "✈️ Scan Flights"

on:
  schedule:
    # Uruchamiaj co 6 godzin (UTC): 00:00, 06:00, 12:00, 18:00
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Pozwól na ręczne uruchomienie z GitHub UI
    inputs:
      force_all_airports:
        description: 'Skanuj ze wszystkich polskich lotnisk (nie tylko rotację)'
        required: false
        default: 'false'
        type: boolean

jobs:
  scan-flights:
    name: 🔍 Skanowanie lotów
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Potrzebne do git push (aktualizacja price_history.json)
    
    steps:
      - name: 📥 Checkout repozytorium
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalacja zależności
        run: pip install -r requirements.txt

      - name: ✈️ Uruchomienie skanera lotów
        run: python -m src.flight_scanner
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_ALL_AIRPORTS: ${{ github.event.inputs.force_all_airports || 'false' }}

      - name: 💾 Commit i push zaktualizowanej historii cen
        run: |
          git config user.name "Flight Deal Bot 🤖"
          git config user.email "bot@github-actions.com"
          git add data/price_history.json data/last_update_id.txt
          
          # Commituj tylko jeśli są zmiany
          if git diff --staged --quiet; then
            echo "📭 Brak zmian do commitowania."
          else
            DEALS=$(python -c "import json; d=json.load(open('data/price_history.json')); print(len(d.get('deals',[])))" 2>/dev/null || echo "?")
            ROUTES=$(python -c "import json; d=json.load(open('data/price_history.json')); print(len(d.get('routes',{})))" 2>/dev/null || echo "?")
            git commit -m "📊 Aktualizacja historii cen — ${ROUTES} tras, ${DEALS} okazji [skip ci]"
            git push
            echo "✅ Historia cen zaktualizowana i wypchnięta."
          fi
